name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate skill structure and agent wiring
        run: npm run validate
      - name: Validate guardrails and security posture
        run: npm run guardrails
      - name: Run setup doctor
        run: npm run doctor
      - name: Build static site
        run: npm run build
