name: Bug
description: Something in paalto isn't behaving as documented.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: One paragraph. Be concrete.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a sequence of chat prompts + the relevant `runs/<id>/transcript.md` excerpt.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 14.5 · Claude Code 1.x · Node 20.x"
    validations:
      required: true
  - type: textarea
    id: events
    attributes:
      label: Relevant `events.jsonl` lines
      description: Paste the lines around the failure. Scrub any sensitive data first.
      render: json
