<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="630" fill="#FAFAF7"/>
  <!-- logo mark -->
  <g transform="translate(80,80)">
    <rect width="64" height="64" fill="#0A0A0A"/>
    <rect x="16" y="16" width="32" height="32" fill="#D4FF00"/>
  </g>
  <text x="170" y="130" font-size="40" fill="#0A0A0A" font-weight="600" letter-spacing="-1">paalto</text>

  <!-- headline -->
  <text x="80" y="290" font-size="76" fill="#0A0A0A" font-weight="600" letter-spacing="-2">Your product team</text>
  <text x="80" y="380" font-size="76" fill="#0A0A0A" font-weight="600" letter-spacing="-2">operating system,</text>
  <g>
    <rect x="80" y="430" width="640" height="22" fill="#D4FF00" y-offset="0"/>
    <text x="80" y="470" font-size="76" fill="#0A0A0A" font-weight="600" letter-spacing="-2">from Claude Code.</text>
  </g>

  <!-- bottom line -->
  <text x="80" y="570" font-size="22" fill="#444" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    Humans own the edges. The system compounds the middle. PRs ship as drafts. Always.
  </text>
</svg>
